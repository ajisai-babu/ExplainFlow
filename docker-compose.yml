services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: explainflow-backend
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: explainflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
